; PlatformIO Project Configuration File
; AD2S1210 <-> ESP32 (WeMos LOLIN32) driver
;
; Docs: https://docs.platformio.org/page/projectconf.html

[env:lolin32]
platform = espressif32
board = lolin32
framework = arduino

; USB-serial monitor speed - must match Serial.begin() in main.cpp
monitor_speed = 115200

; Uncomment and edit if PlatformIO doesn't auto-detect your board's port,
; or if you have multiple serial devices connected.
; Find the right port name in the PlatformIO status bar or Device Manager
; (Windows: COMx) / `ls /dev/tty.*` (macOS) / `ls /dev/ttyUSB*` (Linux).
upload_port = COM4
monitor_port = COM4

; The LOLIN32's onboard USB-serial chip generally auto-resets into
; bootloader mode, so the default esptool upload protocol works as-is.
upload_protocol = esptool
